<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog — Karya yang Bisa Dipakai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EDEAE1;
    --card: #F8F6EE;
    --card-edge: #E4E0D2;
    --ink: #201E1A;
    --ink-soft: #5B564D;
    --ink-faint: #918B7C;
    --rule: #CBC4B2;
    --radius: 3px;
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 1px 1px, rgba(32,30,26,0.05) 1px, transparent 1.4px) 0 0/14px 14px,
      var(--paper);
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }
  a{ color:inherit; }
  ::selection{ background:#2F5D50; color:var(--card); }
  :focus-visible{ outline:2px solid #2F5D50; outline-offset:3px; }

  .wrap{ max-width:1180px; margin:0 auto; padding:0 24px; }

  header.hero{ padding:64px 0 28px; border-bottom:1px solid var(--rule); }
  .drawer-label{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--ink); color:var(--paper); font-size:12px; letter-spacing:.12em;
    padding:5px 10px; border-radius:2px; margin-bottom:22px;
  }
  .drawer-label span.dot{ width:6px; height:6px; border-radius:50%; background:#7FBF9F; display:inline-block; }

  h1.title{
    font-family:'Special Elite', monospace; font-weight:400;
    font-size:clamp(34px, 6vw, 64px); line-height:1.05;
    margin:0 0 18px; letter-spacing:.01em;
  }
  p.subtitle{
    font-family:'Lora', serif; font-size:clamp(16px, 2vw, 19px);
    color:var(--ink-soft); max-width:640px; line-height:1.55; margin:0 0 28px;
  }
  .stat-row{ display:flex; flex-wrap:wrap; gap:28px; font-size:12.5px; color:var(--ink-faint); letter-spacing:.04em; padding-bottom:6px; }
  .stat-row b{ color:var(--ink); font-weight:600; }

  .controls{ position:sticky; top:0; z-index:5; background:var(--paper); padding-top:22px; }
  .search-slot{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--card-edge); border-radius:var(--radius);
    padding:11px 14px; margin-bottom:16px;
  }
  .search-slot svg{ flex:none; opacity:.5; }
  .search-slot input{
    border:0; background:transparent; outline:none; width:100%;
    font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink);
  }
  .search-slot input::placeholder{ color:var(--ink-faint); }

  .tabs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:26px; }
  .tab{
    font-size:12px; letter-spacing:.04em; background:#E4E0D0; color:var(--ink-soft);
    border:1px solid var(--card-edge); border-bottom:none; padding:8px 13px 6px;
    border-radius:4px 4px 0 0; cursor:pointer; transform:translateY(2px);
    transition:transform .15s ease, background .15s ease, color .15s ease;
    display:inline-flex; align-items:center; gap:6px;
  }
  .tab .swatch{ width:7px; height:7px; border-radius:50%; background:var(--sw, var(--ink-faint)); }
  .tab:nth-child(odd){ transform:translateY(0); }
  .tab:hover{ color:var(--ink); }
  .tab.active{ background:var(--card); color:var(--ink); font-weight:600; transform:translateY(4px); }

  main{ padding-bottom:80px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(252px,1fr)); gap:18px; }

  .card{
    position:relative; display:flex; flex-direction:column;
    background:var(--card); border:1px solid var(--card-edge); border-radius:var(--radius);
    padding:18px 18px 16px 30px; text-decoration:none; color:var(--ink);
    min-height:176px;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    box-shadow: 0 1px 0 rgba(32,30,26,0.04);
  }
  .card:hover, .card:focus-visible{
    transform: translateY(-3px) rotate(0deg) !important;
    box-shadow: 0 10px 20px rgba(32,30,26,0.10);
    border-color: var(--accent, #2F5D50);
  }
  .card::before, .card::after{
    content:""; position:absolute; left:12px; width:8px; height:8px; border-radius:50%;
    background:var(--paper); box-shadow: inset 0 1px 2px rgba(32,30,26,0.35);
  }
  .card::before{ top:16px; }
  .card::after{ bottom:16px; }

  /* strip warna kategori — genre sticker ala kartu perpustakaan */
  .genre-strip{
    position:absolute; top:0; right:0; width:26px; height:100%;
    background: var(--accent, #2F5D50); opacity:.10;
  }
  .card.archived .genre-strip{ opacity:.05; }

  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px; }
  .accession{ font-size:11px; color:var(--ink-faint); letter-spacing:.05em; }

  .icon-chip{
    width:26px; height:26px; border-radius:6px; flex:none;
    display:flex; align-items:center; justify-content:center;
    background: color-mix(in srgb, var(--accent, #2F5D50) 16%, var(--card));
    border:1px solid var(--accent, #2F5D50);
    color: var(--accent, #2F5D50);
  }

  .card h3{
    font-family:'Lora', serif; font-weight:600; font-size:17.5px; line-height:1.3; margin:0 0 8px;
  }
  .card p{
    font-size:12.5px; line-height:1.55; color:var(--ink-soft); margin:0; flex-grow:1;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }

  .card-bottom{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:14px; padding-top:12px; border-top:1px dashed var(--rule);
  }
  .status{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-faint); letter-spacing:.03em; }
  .status .dot{ width:6px; height:6px; border-radius:50%; background: var(--ink-faint); }
  .status.live .dot{ background:#2F5D50; }
  .status.beta .dot{ background:#B8862B; }

  .stamp{
    font-size:11px; font-weight:600; letter-spacing:.04em; color: var(--accent, #A63A34);
    border:1px solid var(--accent, #A63A34); padding:3px 8px; border-radius:2px;
    transform:rotate(-2deg); transition: background .15s ease, color .15s ease;
  }
  .card:hover .stamp{ background: var(--accent, #A63A34); color:var(--card); }

  .empty{ display:none; text-align:center; padding:60px 20px; color:var(--ink-faint); font-size:14px; }
  .empty.show{ display:block; }

  footer{
    border-top:1px solid var(--rule); padding:26px 0 50px; font-size:12px; color:var(--ink-faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  footer a{ color:var(--ink-soft); text-decoration:underline; text-underline-offset:3px; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; scroll-behavior:auto !important; } }
  @media (max-width:560px){ header.hero{ padding-top:44px; } .controls{ position:static; } }
</style>
</head>
<body>

<div class="wrap">
  <header class="hero">
    <span class="drawer-label"><span class="dot"></span> INDEX — VOL. 01</span>
    <h1 class="title">Katalog Karya</h1>
    <p class="subtitle">Setiap kartu adalah entri katalog yang terhubung langsung ke aplikasi web — warna di tepinya menandai kategori.</p>
    <div class="stat-row" id="statRow"></div>
  </header>

  <div class="controls">
    <div class="search-slot">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Cari judul, deskripsi, atau kategori…" autocomplete="off">
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty">Tidak ada entri yang cocok. Coba kata kunci lain.</p>
  </main>

  <footer>
    <span>© <span id="year"></span> — dirawat manual, satu file, tanpa build step.</span>
    <a href="https://github.com/" target="_blank" rel="noopener">github.com/username</a>
  </footer>
</div>

<script>
/* =========================================================================
   DATA KATALOG — edit di sini untuk menambah / mengubah proyek
   ========================================================================= */
const DATA = [
  { title: "Habit Tracker", desc: "Pelacak kebiasaan harian dengan grafik progres mingguan dan pengingat sederhana.", url: "#", category: "Alat", status: "live" },
  { title: "Split Bill", desc: "Hitung dan bagi tagihan patungan dalam hitungan detik, tanpa perlu login.", url: "#", category: "Alat", status: "live" },
  { title: "Pixel Sketch", desc: "Kanvas piksel mini di browser untuk iseng menggambar dan mengekspor PNG.", url: "#", category: "Eksperimen", status: "beta" },
  { title: "Reader Mode", desc: "Bersihkan halaman artikel dari iklan dan pop-up, sisakan teksnya saja.", url: "#", category: "Utilitas", status: "live" },
  { title: "Word Chain", desc: "Permainan sambung kata dua pemain, main langsung di satu tab browser.", url: "#", category: "Permainan", status: "live" },
  { title: "CSV Peek", desc: "Tempel file CSV, langsung lihat tabel, statistik ringkas, dan grafik dasarnya.", url: "#", category: "Data", status: "live" },
  { title: "Focus Timer", desc: "Timer pomodoro dengan suara ambient dan catatan sesi sederhana.", url: "#", category: "Alat", status: "live" },
  { title: "Color Picker+", desc: "Ambil warna dari gambar, dapatkan HEX, RGB, dan palet komplementernya.", url: "#", category: "Utilitas", status: "live" },
  { title: "Old Portfolio", desc: "Versi pertama situs portofolio ini sebelum dirombak total. Disimpan sebagai arsip.", url: "#", category: "Eksperimen", status: "archived" },
  { title: "Quote Wall", desc: "Kumpulan kutipan favorit dengan tampilan kartu acak setiap kali dimuat ulang.", url: "#", category: "Eksperimen", status: "beta" },
  { title: "Expense Split", desc: "Catat pengeluaran kelompok dan lihat siapa berhutang ke siapa secara otomatis.", url: "#", category: "Data", status: "live" },
  { title: "Memory Match", desc: "Permainan kartu memori klasik dengan tiga tingkat kesulitan.", url: "#", category: "Permainan", status: "live" },
  { title: "Markdown Live", desc: "Editor markdown dengan pratinjau langsung dan ekspor ke HTML.", url: "#", category: "Alat", status: "live" },
  { title: "QR Generator", desc: "Buat kode QR dari teks, tautan, atau kontak, langsung unduh sebagai gambar.", url: "#", category: "Utilitas", status: "live" },
  { title: "Weather Glance", desc: "Ringkasan cuaca tujuh hari dengan tampilan minim dan cepat dibaca.", url: "#", category: "Data", status: "beta" },
  { title: "Typing Test", desc: "Uji kecepatan mengetik dengan skor WPM dan akurasi real-time.", url: "#", category: "Permainan", status: "live" },
];

/* Warna & ikon per kategori — dipakai untuk strip tepi kartu, chip ikon, dan tab */
const CATEGORY_META = {
  "Alat":       { color: "#3E6FBF", icon: "gauge" },
  "Permainan":  { color: "#7A56C7", icon: "controller" },
  "Data":       { color: "#2F5D50", icon: "bars" },
  "Utilitas":   { color: "#B8862B", icon: "sliders" },
  "Eksperimen": { color: "#A63A34", icon: "hexagon" },
};
const DEFAULT_META = { color: "#918B7C", icon: "hexagon" };

const ICONS = {
  gauge: `<circle cx="12" cy="12" r="8"/><line x1="12" y1="12" x2="15.5" y2="8.5"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>`,
  controller: `<rect x="3" y="9" width="18" height="8" rx="4"/><circle cx="8" cy="13" r="1.1" fill="currentColor" stroke="none"/><circle cx="16" cy="13" r="1.1" fill="currentColor" stroke="none"/>`,
  bars: `<line x1="5" y1="19" x2="5" y2="11" stroke-width="2.2"/><line x1="12" y1="19" x2="12" y2="5" stroke-width="2.2"/><line x1="19" y1="19" x2="19" y2="14" stroke-width="2.2"/>`,
  sliders: `<line x1="4" y1="7" x2="20" y2="7"/><circle cx="14" cy="7" r="2" fill="#F8F6EE"/><line x1="4" y1="14" x2="20" y2="14"/><circle cx="9" cy="14" r="2" fill="#F8F6EE"/><line x1="4" y1="19" x2="20" y2="19"/><circle cx="17" cy="19" r="2" fill="#F8F6EE"/>`,
  hexagon: `<polygon points="12,3 20,7.5 20,16.5 12,21 4,16.5 4,7.5"/>`,
};

/* ================= render — umumnya tidak perlu diubah ================= */
const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const searchEl = document.getElementById('search');
const emptyEl = document.getElementById('empty');
const statRow = document.getElementById('statRow');
document.getElementById('year').textContent = new Date().getFullYear();

const categories = ["Semua", ...Array.from(new Set(DATA.map(d => d.category)))];
let activeCategory = "Semua";

function meta(cat){ return CATEGORY_META[cat] || DEFAULT_META; }
function statusLabel(s){ return { live:"Aktif", beta:"Beta", archived:"Arsip" }[s] || s; }

function buildTabs(){
  tabsEl.innerHTML = "";
  categories.forEach(cat => {
    const btn = document.createElement('button');
    const m = cat === "Semua" ? null : meta(cat);
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    if (m) btn.style.setProperty('--sw', m.color);
    btn.innerHTML = `<span class="swatch"></span>${cat}`;
    btn.addEventListener('click', () => { activeCategory = cat; buildTabs(); render(); });
    tabsEl.appendChild(btn);
  });
}

function render(){
  const q = searchEl.value.trim().toLowerCase();
  const filtered = DATA.filter(d => {
    const matchesCat = activeCategory === "Semua" || d.category === activeCategory;
    const matchesQ = !q || (d.title + d.desc + d.category).toLowerCase().includes(q);
    return matchesCat && matchesQ;
  });

  grid.innerHTML = "";
  filtered.forEach(d => {
    const idx = DATA.indexOf(d) + 1;
    const m = meta(d.category);
    const a = document.createElement('a');
    a.className = 'card' + (d.status === 'archived' ? ' archived' : '');
    a.href = d.url; a.target = '_blank'; a.rel = 'noopener';
    const tilt = ((idx % 5) - 2) * 0.4;
    a.style.transform = `rotate(${tilt}deg)`;
    a.style.setProperty('--accent', m.color);

    a.innerHTML = `
      <div class="genre-strip"></div>
      <div class="card-top">
        <span class="accession">No. ${String(idx).padStart(3,'0')}</span>
        <div class="icon-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[m.icon]}</svg>
        </div>
      </div>
      <h3>${d.title}</h3>
      <p>${d.desc}</p>
      <div class="card-bottom">
        <span class="status ${d.status}"><span class="dot"></span>${d.category} · ${statusLabel(d.status)}</span>
        <span class="stamp">Buka →</span>
      </div>
    `;
    grid.appendChild(a);
  });

  emptyEl.classList.toggle('show', filtered.length === 0);
  statRow.innerHTML = `<span><b>${DATA.length}</b> entri dalam katalog</span><span><b>${categories.length - 1}</b> kategori</span>`;
}

searchEl.addEventListener('input', render);
buildTabs();
render();
</script>

</body>
</html>
