<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog — Karya yang Bisa Dipakai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14161B;
    --card: #1B1E24;
    --card-border: #272B33;
    --ink: #ECEDEE;
    --ink-soft: #9AA0A8;
    --ink-faint: #656B75;
    --gray: #565C66;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }
  a{ color:inherit; }
  ::selection{ background:#4C8DFF; color:#fff; }
  :focus-visible{ outline:2px solid #4C8DFF; outline-offset:3px; }

  .wrap{ max-width:1180px; margin:0 auto; padding:0 24px; }

  header.hero{ padding:64px 0 26px; border-bottom:1px solid var(--card-border); }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; letter-spacing:.14em; color: var(--ink-faint);
    text-transform:uppercase; margin-bottom:18px;
  }
  .eyebrow .bar{ width:18px; height:1px; background: var(--ink-faint); }

  h1.title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(32px, 5.5vw, 56px);
    line-height:1.08;
    margin:0 0 16px;
    letter-spacing:-.01em;
  }
  p.subtitle{
    font-size:clamp(14px, 1.6vw, 16px);
    color: var(--ink-soft);
    max-width:600px;
    line-height:1.6;
    margin:0 0 30px;
  }
  .stat-row{ display:flex; gap:26px; font-size:12px; color:var(--ink-faint); padding-bottom:4px; }
  .stat-row b{ color:var(--ink); font-weight:600; }

  .controls{ position:sticky; top:0; z-index:5; background:var(--bg); padding-top:22px; }
  .search-slot{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--card-border); border-radius:8px;
    padding:11px 14px; margin-bottom:14px;
  }
  .search-slot svg{ flex:none; opacity:.5; }
  .search-slot input{
    border:0; background:transparent; outline:none; width:100%;
    font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink);
  }
  .search-slot input::placeholder{ color: var(--ink-faint); }

  .tabs{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px; }
  .tab{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.03em;
    background:transparent; color: var(--tab-color, var(--ink-soft));
    border:1px solid var(--tab-color, var(--card-border));
    padding:7px 13px; border-radius:20px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition: background .15s ease, color .15s ease;
  }
  .tab .swatch{ width:7px; height:7px; border-radius:50%; background: var(--tab-color, var(--ink-faint)); }
  .tab.active{ background: var(--tab-color, var(--gray)); color:#101216; font-weight:600; }
  .tab.active .swatch{ background:#101216; }

  main{ padding-bottom:80px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(256px,1fr)); gap:16px; }

  .card{
    position:relative;
    display:flex; flex-direction:column;
    background:var(--card); border:1px solid var(--card-border);
    border-radius:10px; padding:20px 18px 16px 22px;
    text-decoration:none; color:var(--ink); overflow:hidden;
    min-height:172px;
    transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--accent, var(--gray));
  }
  .card:hover, .card:focus-visible{
    transform: translateY(-3px);
    border-color: var(--accent, var(--gray));
    box-shadow: 0 12px 24px rgba(0,0,0,0.35);
  }
  .card.archived{ opacity:.55; }

  .icon-frame{
    width:38px; height:38px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    background: color-mix(in srgb, var(--accent, var(--gray)) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--accent, var(--gray)) 40%, transparent);
    color: var(--accent, var(--gray));
    margin-bottom:14px;
  }

  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; }

  .card h3{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600; font-size:16.5px; line-height:1.3;
    margin:0 0 6px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .beta-tag{
    font-size:9.5px; letter-spacing:.06em; text-transform:uppercase;
    color:#F0B429; border:1px solid #F0B429; border-radius:3px; padding:1px 5px;
    font-family:'IBM Plex Mono', monospace; font-weight:600;
  }

  .card p{
    font-size:12.5px; line-height:1.55; color:var(--ink-soft); margin:0;
    flex-grow:1;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .card-bottom{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:14px; padding-top:12px; border-top:1px solid var(--card-border);
    font-size:11px; color:var(--ink-faint);
  }
  .open{
    color: var(--accent, var(--gray)); font-weight:600; font-size:11.5px;
    display:inline-flex; align-items:center; gap:4px;
  }

  .empty{ display:none; text-align:center; padding:60px 20px; color:var(--ink-faint); font-size:14px; }
  .empty.show{ display:block; }

  footer{
    border-top:1px solid var(--card-border); padding:26px 0 50px;
    font-size:12px; color:var(--ink-faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  footer a{ color:var(--ink-soft); text-decoration:underline; text-underline-offset:3px; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
  @media (max-width:560px){ .controls{ position:static; } }
</style>
</head>
<body>

<div class="wrap">
  <header class="hero">
    <span class="eyebrow"><span class="bar"></span> Sistem Katalog</span>
    <h1 class="title">Katalog Karya</h1>
    <p class="subtitle">Setiap kartu terhubung ke aplikasi web yang bisa dibuka dan dipakai langsung. Warna menandai kategori, bukan hiasan.</p>
    <div class="stat-row" id="statRow"></div>
  </header>

  <div class="controls">
    <div class="search-slot">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Cari judul, deskripsi, atau kategori…" autocomplete="off">
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty">Tidak ada entri yang cocok. Coba kata kunci lain.</p>
  </main>

  <footer>
    <span>© <span id="year"></span> — dirawat manual, satu file, tanpa build step.</span>
    <a href="https://github.com/" target="_blank" rel="noopener">github.com/username</a>
  </footer>
</div>

<script>
/* =========================================================================
   DATA KATALOG — edit di sini untuk menambah / mengubah proyek
   ========================================================================= */
const DATA = [
  { title: "Habit Tracker", desc: "Pelacak kebiasaan harian dengan grafik progres mingguan.", url: "#", category: "Alat", status: "live" },
  { title: "Split Bill", desc: "Hitung dan bagi tagihan patungan dalam hitungan detik.", url: "#", category: "Alat", status: "live" },
  { title: "Pixel Sketch", desc: "Kanvas piksel mini untuk iseng menggambar dan ekspor PNG.", url: "#", category: "Eksperimen", status: "beta" },
  { title: "Reader Mode", desc: "Bersihkan halaman artikel dari iklan, sisakan teksnya saja.", url: "#", category: "Utilitas", status: "live" },
  { title: "Word Chain", desc: "Permainan sambung kata dua pemain di satu tab browser.", url: "#", category: "Permainan", status: "live" },
  { title: "CSV Peek", desc: "Tempel CSV, langsung lihat tabel, statistik, dan grafik.", url: "#", category: "Data", status: "live" },
  { title: "Focus Timer", desc: "Timer pomodoro dengan suara ambient dan catatan sesi.", url: "#", category: "Alat", status: "live" },
  { title: "Color Picker+", desc: "Ambil warna dari gambar, dapatkan HEX, RGB, dan palet.", url: "#", category: "Utilitas", status: "live" },
  { title: "Old Portfolio", desc: "Versi pertama situs ini sebelum dirombak. Disimpan arsip.", url: "#", category: "Eksperimen", status: "archived" },
  { title: "Quote Wall", desc: "Kutipan favorit dengan tampilan kartu acak tiap dimuat.", url: "#", category: "Eksperimen", status: "beta" },
  { title: "Expense Split", desc: "Catat pengeluaran kelompok, lihat siapa berhutang otomatis.", url: "#", category: "Data", status: "live" },
  { title: "Memory Match", desc: "Permainan kartu memori klasik, tiga tingkat kesulitan.", url: "#", category: "Permainan", status: "live" },
  { title: "Markdown Live", desc: "Editor markdown dengan pratinjau langsung, ekspor HTML.", url: "#", category: "Alat", status: "live" },
  { title: "QR Generator", desc: "Buat kode QR dari teks atau tautan, unduh sebagai gambar.", url: "#", category: "Utilitas", status: "live" },
  { title: "Weather Glance", desc: "Ringkasan cuaca tujuh hari, tampilan minim dan cepat.", url: "#", category: "Data", status: "beta" },
  { title: "Typing Test", desc: "Uji kecepatan mengetik dengan skor WPM dan akurasi.", url: "#", category: "Permainan", status: "live" },
];

/* Warna & ikon per kategori — satu-satunya sumber warna di halaman ini */
const CATEGORY_META = {
  "Alat":       { color: "#4C8DFF", icon: "gauge" },
  "Permainan":  { color: "#9B6BFF", icon: "controller" },
  "Data":       { color: "#34C77B", icon: "bars" },
  "Utilitas":   { color: "#F0B429", icon: "sliders" },
  "Eksperimen": { color: "#F0473E", icon: "hexagon" },
};
const DEFAULT_META = { color: "#565C66", icon: "hexagon" };

const ICONS = {
  gauge: `<circle cx="12" cy="12" r="8"/><line x1="12" y1="12" x2="15.5" y2="8.5"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>`,
  controller: `<rect x="3" y="9" width="18" height="8" rx="4"/><circle cx="8" cy="13" r="1.1" fill="currentColor" stroke="none"/><circle cx="16" cy="13" r="1.1" fill="currentColor" stroke="none"/>`,
  bars: `<line x1="5" y1="19" x2="5" y2="11" stroke-width="2.4"/><line x1="12" y1="19" x2="12" y2="5" stroke-width="2.4"/><line x1="19" y1="19" x2="19" y2="14" stroke-width="2.4"/>`,
  sliders: `<line x1="4" y1="7" x2="20" y2="7"/><circle cx="14" cy="7" r="2" fill="#1B1E24"/><line x1="4" y1="14" x2="20" y2="14"/><circle cx="9" cy="14" r="2" fill="#1B1E24"/><line x1="4" y1="19" x2="20" y2="19"/><circle cx="17" cy="19" r="2" fill="#1B1E24"/>`,
  hexagon: `<polygon points="12,3 20,7.5 20,16.5 12,21 4,16.5 4,7.5"/>`,
};

/* ================= render — umumnya tidak perlu diubah ================= */
const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const searchEl = document.getElementById('search');
const emptyEl = document.getElementById('empty');
const statRow = document.getElementById('statRow');
document.getElementById('year').textContent = new Date().getFullYear();

const categories = ["Semua", ...Array.from(new Set(DATA.map(d => d.category)))];
let activeCategory = "Semua";

function meta(cat){ return CATEGORY_META[cat] || DEFAULT_META; }

function buildTabs(){
  tabsEl.innerHTML = "";
  categories.forEach(cat => {
    const btn = document.createElement('button');
    const m = cat === "Semua" ? null : meta(cat);
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    if (m) btn.style.setProperty('--tab-color', m.color);
    btn.innerHTML = `<span class="swatch"></span>${cat}`;
    btn.addEventListener('click', () => { activeCategory = cat; buildTabs(); render(); });
    tabsEl.appendChild(btn);
  });
}

function statusLabel(s){ return { live:"Aktif", beta:"Beta", archived:"Arsip" }[s] || s; }

function render(){
  const q = searchEl.value.trim().toLowerCase();
  const filtered = DATA.filter(d => {
    const matchesCat = activeCategory === "Semua" || d.category === activeCategory;
    const matchesQ = !q || (d.title + d.desc + d.category).toLowerCase().includes(q);
    return matchesCat && matchesQ;
  });

  grid.innerHTML = "";
  filtered.forEach(d => {
    const m = meta(d.category);
    const a = document.createElement('a');
    a.className = 'card' + (d.status === 'archived' ? ' archived' : '');
    a.href = d.url; a.target = '_blank'; a.rel = 'noopener';
    a.style.setProperty('--accent', d.status === 'archived' ? '#565C66' : m.color);
    a.innerHTML = `
      <div class="icon-frame">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[m.icon]}</svg>
      </div>
      <h3>${d.title}${d.status === 'beta' ? '<span class="beta-tag">Beta</span>' : ''}</h3>
      <p>${d.desc}</p>
      <div class="card-bottom">
        <span>${d.category} · ${statusLabel(d.status)}</span>
        <span class="open">Buka →</span>
      </div>
    `;
    grid.appendChild(a);
  });

  emptyEl.classList.toggle('show', filtered.length === 0);
  statRow.innerHTML = `<span><b>${DATA.length}</b> entri dalam katalog</span><span><b>${categories.length - 1}</b> kategori</span>`;
}

searchEl.addEventListener('input', render);
buildTabs();
render();
</script>

</body>
</html>
