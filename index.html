<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog — Karya yang Bisa Dipakai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14161B;
    --card: #1B1E24;
    --card-border: #272B33;
    --ink: #ECEDEE;
    --ink-soft: #9AA0A8;
    --ink-faint: #656B75;
    --gray: #565C66;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }
  a{ color:inherit; }
  ::selection{ background:#4C8DFF; color:#fff; }
  :focus-visible{ outline:2px solid #4C8DFF; outline-offset:3px; }

  .wrap{ max-width:1180px; margin:0 auto; padding:0 24px; }

  /* ---------- controls (sekarang jadi elemen paling atas) ---------- */
  .controls{ padding:48px 0 0; }
  .search-row{ display:flex; gap:10px; margin-bottom:14px; }
  .search-slot{
    display:flex; align-items:center; gap:10px; flex:1;
    background:var(--card); border:1px solid var(--card-border); border-radius:8px;
    padding:11px 14px;
  }
  .search-slot svg{ flex:none; opacity:.5; }
  .search-slot input{
    border:0; background:transparent; outline:none; width:100%;
    font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink);
  }
  .search-slot input::placeholder{ color: var(--ink-faint); }
  .reload-btn{
    flex:none; width:40px; height:40px; border-radius:8px;
    background:var(--card); border:1px solid var(--card-border); color:var(--ink-soft);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: color .15s ease, border-color .15s ease, transform .3s ease;
  }
  .reload-btn:hover{ color:#4C8DFF; border-color:#4C8DFF; }
  .reload-btn.spinning svg{ animation: spin .7s linear; }
  @keyframes spin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

  .tabs{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .tab{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.03em;
    background:transparent; color: var(--tab-color, var(--ink-soft));
    border:1px solid var(--tab-color, var(--card-border));
    padding:7px 13px; border-radius:20px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition: background .15s ease, color .15s ease;
  }
  .tab .swatch{ width:7px; height:7px; border-radius:50%; background: var(--tab-color, var(--ink-faint)); }
  .tab.active{ background: var(--tab-color, var(--gray)); color:#101216; font-weight:600; }
  .tab.active .swatch{ background:#101216; }

  .meta-bar{
    font-size:11.5px; color:var(--ink-faint); letter-spacing:.03em;
    padding-bottom:18px; border-bottom:1px solid var(--card-border); margin-bottom:20px;
  }
  .meta-bar b{ color:var(--ink); font-weight:600; }
  .meta-bar.error{ color:#F0473E; }

  main{ padding-bottom:80px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(256px,1fr)); gap:16px; }

  .card{
    position:relative;
    display:flex; flex-direction:column;
    background:var(--card); border:1px solid var(--card-border);
    border-radius:10px; padding:20px 18px 16px 22px;
    text-decoration:none; color:var(--ink); overflow:hidden;
    min-height:172px;
    transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--accent, var(--gray));
  }
  .card:hover, .card:focus-visible{
    transform: translateY(-3px);
    border-color: var(--accent, var(--gray));
    box-shadow: 0 12px 24px rgba(0,0,0,0.35);
  }
  .card.archived{ opacity:.55; }

  .icon-frame{
    width:38px; height:38px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    background: color-mix(in srgb, var(--accent, var(--gray)) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--accent, var(--gray)) 40%, transparent);
    color: var(--accent, var(--gray));
    margin-bottom:14px;
  }

  .card h3{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600; font-size:16.5px; line-height:1.3;
    margin:0 0 6px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .beta-tag{
    font-size:9.5px; letter-spacing:.06em; text-transform:uppercase;
    color:#F0B429; border:1px solid #F0B429; border-radius:3px; padding:1px 5px;
    font-family:'IBM Plex Mono', monospace; font-weight:600;
  }

  .card p{
    font-size:12.5px; line-height:1.55; color:var(--ink-soft); margin:0;
    flex-grow:1;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .card-bottom{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:14px; padding-top:12px; border-top:1px solid var(--card-border);
    font-size:11px; color:var(--ink-faint);
  }
  .open{
    color: var(--accent, var(--gray)); font-weight:600; font-size:11.5px;
    display:inline-flex; align-items:center; gap:4px;
  }

  .empty{ display:none; text-align:center; padding:60px 20px; color:var(--ink-faint); font-size:14px; }
  .empty.show{ display:block; }

  .sample-banner{
    display:none;
    background:#2A2412; border:1px solid #F0B429; color:#F0B429;
    font-size:12px; padding:10px 14px; border-radius:8px; margin-bottom:18px;
  }
  .sample-banner.show{ display:block; }

  footer{
    border-top:1px solid var(--card-border); padding:26px 0 50px;
    font-size:12px; color:var(--ink-faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  footer a{ color:var(--ink-soft); text-decoration:underline; text-underline-offset:3px; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } .reload-btn.spinning svg{ animation:none; } }
</style>
</head>
<body>

<div class="wrap">
  <div class="controls">
    <p class="sample-banner" id="sampleBanner">Menampilkan data contoh — sambungkan URL Google Sheet Anda di CONFIG.SHEET_API_URL pada kode.</p>
    <div class="search-row">
      <div class="search-slot">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Cari judul, deskripsi, atau kategori…" autocomplete="off">
      </div>
      <button class="reload-btn" id="reloadBtn" title="Muat ulang data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
    <div class="tabs" id="tabs"></div>
    <p class="meta-bar" id="metaBar">Memuat katalog…</p>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty">Tidak ada entri yang cocok. Coba kata kunci lain.</p>
  </main>

  <footer>
    <span>© <span id="year"></span> — data diatur lewat Google Sheet.</span>
    <a href="https://github.com/" target="_blank" rel="noopener">github.com/username</a>
  </footer>
</div>

<script>
/* =========================================================================
   KONFIGURASI
   -------------------------------------------------------------------------
   Tempel URL Web App Apps Script di sini (lihat panduan deploy yang menyertai
   file ini). Selama masih kosong, halaman akan pakai data contoh di bawah.
   ========================================================================= */
const CONFIG = {
  SHEET_API_URL: "https://script.google.com/macros/s/AKfycbzqM3jx8bE3iYF4I0u3N9o_fAiefUXKSInYUg41jtC_PK2rQZwRuJjKGEbwEr6uih8efA/exec" // contoh: "https://script.google.com/macros/s/XXXXXXXX/exec"
};

/* Data contoh — hanya dipakai kalau SHEET_API_URL kosong atau gagal diakses */
const SAMPLE_DATA = [
  { title: "Habit Tracker", desc: "Pelacak kebiasaan harian dengan grafik progres mingguan.", url: "#", category: "Alat", status: "live" },
  { title: "Pixel Sketch", desc: "Kanvas piksel mini untuk iseng menggambar dan ekspor PNG.", url: "#", category: "Eksperimen", status: "beta" },
  { title: "CSV Peek", desc: "Tempel CSV, langsung lihat tabel, statistik, dan grafik.", url: "#", category: "Data", status: "live" },
  { title: "Memory Match", desc: "Permainan kartu memori klasik, tiga tingkat kesulitan.", url: "#", category: "Permainan", status: "live" },
  { title: "QR Generator", desc: "Buat kode QR dari teks atau tautan, unduh sebagai gambar.", url: "#", category: "Utilitas", status: "live" },
];

/* Warna & ikon per kategori — satu-satunya sumber warna di halaman ini.
   Tambah baris baru di sini kalau menambah kategori baru di Google Sheet. */
const CATEGORY_META = {
  "Alat":       { color: "#4C8DFF", icon: "gauge" },
  "Permainan":  { color: "#9B6BFF", icon: "controller" },
  "Data":       { color: "#34C77B", icon: "bars" },
  "Utilitas":   { color: "#F0B429", icon: "sliders" },
  "Eksperimen": { color: "#F0473E", icon: "hexagon" },
};
const DEFAULT_META = { color: "#565C66", icon: "hexagon" };

const ICONS = {
  gauge: `<circle cx="12" cy="12" r="8"/><line x1="12" y1="12" x2="15.5" y2="8.5"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>`,
  controller: `<rect x="3" y="9" width="18" height="8" rx="4"/><circle cx="8" cy="13" r="1.1" fill="currentColor" stroke="none"/><circle cx="16" cy="13" r="1.1" fill="currentColor" stroke="none"/>`,
  bars: `<line x1="5" y1="19" x2="5" y2="11" stroke-width="2.4"/><line x1="12" y1="19" x2="12" y2="5" stroke-width="2.4"/><line x1="19" y1="19" x2="19" y2="14" stroke-width="2.4"/>`,
  sliders: `<line x1="4" y1="7" x2="20" y2="7"/><circle cx="14" cy="7" r="2" fill="#1B1E24"/><line x1="4" y1="14" x2="20" y2="14"/><circle cx="9" cy="14" r="2" fill="#1B1E24"/><line x1="4" y1="19" x2="20" y2="19"/><circle cx="17" cy="19" r="2" fill="#1B1E24"/>`,
  hexagon: `<polygon points="12,3 20,7.5 20,16.5 12,21 4,16.5 4,7.5"/>`,
};

/* ================= state & render — umumnya tidak perlu diubah ================= */
let DATA = [];
let categories = ["Semua"];
let activeCategory = "Semua";

const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const searchEl = document.getElementById('search');
const emptyEl = document.getElementById('empty');
const metaBar = document.getElementById('metaBar');
const sampleBanner = document.getElementById('sampleBanner');
const reloadBtn = document.getElementById('reloadBtn');
document.getElementById('year').textContent = new Date().getFullYear();

function meta(cat){ return CATEGORY_META[cat] || DEFAULT_META; }
function statusLabel(s){ return { live:"Aktif", beta:"Beta", archived:"Arsip" }[s] || s || "Aktif"; }

function buildTabs(){
  categories = ["Semua", ...Array.from(new Set(DATA.map(d => d.category).filter(Boolean)))];
  if (!categories.includes(activeCategory)) activeCategory = "Semua";
  tabsEl.innerHTML = "";
  categories.forEach(cat => {
    const btn = document.createElement('button');
    const m = cat === "Semua" ? null : meta(cat);
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    if (m) btn.style.setProperty('--tab-color', m.color);
    btn.innerHTML = `<span class="swatch"></span>${cat}`;
    btn.addEventListener('click', () => { activeCategory = cat; buildTabs(); render(); });
    tabsEl.appendChild(btn);
  });
}

function render(){
  const q = searchEl.value.trim().toLowerCase();
  const filtered = DATA.filter(d => {
    const matchesCat = activeCategory === "Semua" || d.category === activeCategory;
    const matchesQ = !q || ((d.title||"") + (d.desc||"") + (d.category||"")).toLowerCase().includes(q);
    return matchesCat && matchesQ;
  });

  grid.innerHTML = "";
  filtered.forEach(d => {
    const m = meta(d.category);
    const a = document.createElement('a');
    a.className = 'card' + (d.status === 'archived' ? ' archived' : '');
    a.href = d.url || '#'; a.target = '_blank'; a.rel = 'noopener';
    a.style.setProperty('--accent', d.status === 'archived' ? '#565C66' : m.color);
    a.innerHTML = `
      <div class="icon-frame">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[m.icon]}</svg>
      </div>
      <h3>${d.title || "(tanpa judul)"}${d.status === 'beta' ? '<span class="beta-tag">Beta</span>' : ''}</h3>
      <p>${d.desc || ""}</p>
      <div class="card-bottom">
        <span>${d.category || "Lainnya"} · ${statusLabel(d.status)}</span>
        <span class="open">Buka →</span>
      </div>
    `;
    grid.appendChild(a);
  });

  emptyEl.classList.toggle('show', filtered.length === 0);
  metaBar.classList.remove('error');
  metaBar.innerHTML = `<b>${DATA.length}</b> entri dalam katalog · <b>${categories.length - 1}</b> kategori`;
}

/* ================= pengambilan data dari Google Sheet ================= */
async function loadData(){
  reloadBtn.classList.add('spinning');

  if (!CONFIG.SHEET_API_URL) {
    DATA = SAMPLE_DATA;
    sampleBanner.classList.add('show');
    buildTabs();
    render();
    reloadBtn.classList.remove('spinning');
    return;
  }

  metaBar.textContent = "Memuat katalog…";
  try {
    const res = await fetch(CONFIG.SHEET_API_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Respons tidak OK");
    const json = await res.json();
    if (!Array.isArray(json)) throw new Error("Format data tidak sesuai");
    DATA = json;
    sampleBanner.classList.remove('show');
  } catch (err) {
    DATA = SAMPLE_DATA;
    sampleBanner.classList.add('show');
    metaBar.classList.add('error');
    metaBar.textContent = "Gagal memuat dari Google Sheet — menampilkan data contoh. (" + err.message + ")";
  }
  buildTabs();
  render();
  reloadBtn.classList.remove('spinning');
}

searchEl.addEventListener('input', render);
reloadBtn.addEventListener('click', loadData);
loadData();
</script>

</body>
</html>
