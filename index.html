<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebApp Portfolio | Koleksi Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="logo">✨ WebApp Portfolio</h1>
            <p class="tagline">Koleksi project & tools yang bisa langsung digunakan</p>
            <div class="header-controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Cari webapp..." class="search-input">
                </div>
                <div class="filter-tags" id="filterTags"></div>
            </div>
            <div class="stats">
                <span id="appCount">0</span> WebApps Tersedia
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="cards-grid" id="cardsGrid">
                <!-- Cards will be dynamically generated here -->
            </div>
            <div class="no-results" id="noResults" style="display: none;">
                <p>🔍 Tidak ada webapp yang ditemukan</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2024 WebApp Portfolio • Dibuat dengan ❤️ menggunakan GitHub Pages</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
