<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog — Karya yang Bisa Dipakai</title>
<script>
  (function(){
    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html[data-theme="dark"]{
    --bg: #1B1D22;
    --card: #23262E;
    --card-border: #30343D;
    --ink: #E7E8EA;
    --ink-soft: #A6ACB5;
    --ink-faint: #6E7480;
    --gray: #5B6270;
    --shadow: rgba(0,0,0,0.32);
  }
  html[data-theme="light"]{
    --bg: #F2F3F6;
    --card: #FFFFFF;
    --card-border: #E3E5EA;
    --ink: #23262E;
    --ink-soft: #565C68;
    --ink-faint: #8A8F9A;
    --gray: #B7BCC6;
    --shadow: rgba(35,38,46,0.10);
  }

  *{ box-sizing:border-box; }
  html, body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
    transition: background .2s ease, color .2s ease;
  }
  a{ color:inherit; }
  ::selection{ background:#4C8DFF; color:#fff; }
  :focus-visible{ outline:2px solid #4C8DFF; outline-offset:3px; }

  /* ---------- kerangka halaman: header & footer tetap, area kartu yang scroll ---------- */
  .page{ display:flex; flex-direction:column; height:100vh; overflow:hidden; }
  .wrap{ width:100%; padding:0 1cm; box-sizing:border-box; }

  .controls{ flex:none; padding-top:36px; }
  .tagline{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:clamp(15px, 1.6vw, 18px);
    color: var(--ink-soft);
    margin:0 0 18px;
    letter-spacing:.01em;
  }
  .search-row{ display:flex; gap:10px; margin-bottom:14px; }
  .search-slot{
    display:flex; align-items:center; gap:10px; flex:1;
    background:var(--card); border:1px solid var(--card-border); border-radius:8px;
    padding:11px 14px;
    transition: background .2s ease, border-color .2s ease;
  }
  .search-slot svg{ flex:none; opacity:.5; }
  .search-slot input{
    border:0; background:transparent; outline:none; width:100%;
    font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink);
  }
  .search-slot input::placeholder{ color: var(--ink-faint); }

  .icon-btn{
    flex:none; width:40px; height:40px; border-radius:8px;
    background:var(--card); border:1px solid var(--card-border); color:var(--ink-soft);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: color .15s ease, border-color .15s ease, background .2s ease;
  }
  .icon-btn:hover{ color:#4C8DFF; border-color:#4C8DFF; }
  .icon-btn.spinning svg{ animation: spin .7s linear; }
  @keyframes spin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

  .theme-toggle .icon-sun{ display:none; }
  .theme-toggle .icon-moon{ display:block; }
  html[data-theme="dark"] .theme-toggle .icon-sun{ display:block; }
  html[data-theme="dark"] .theme-toggle .icon-moon{ display:none; }

  .tabs{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .tab{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.03em;
    background:transparent; color: var(--tab-color, var(--ink-soft));
    border:1px solid var(--tab-color, var(--card-border));
    padding:7px 13px; border-radius:20px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition: background .15s ease, color .15s ease, border-color .2s ease;
  }
  .tab .swatch{ width:7px; height:7px; border-radius:50%; background: var(--tab-color, var(--ink-faint)); }
  .tab.active{ background: var(--tab-color, var(--gray)); color:#101216; font-weight:600; }
  .tab.active .swatch{ background:#101216; }

  .meta-bar{
    display:none;
    font-size:11.5px; color:#E05248; letter-spacing:.03em;
    padding-bottom:14px;
  }
  .meta-bar.show{ display:block; }

  /* ---------- area kartu (satu-satunya bagian yang scroll) ---------- */
  main{ flex:1 1 auto; overflow-y:auto; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(256px,1fr)); gap:16px; padding-bottom:32px; }

  .card{
    position:relative;
    display:flex; flex-direction:column;
    background:var(--card); border:1px solid var(--card-border);
    border-radius:10px; padding:20px 18px 16px 22px;
    text-decoration:none; color:var(--ink); overflow:hidden;
    min-height:188px;
    transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .2s ease;
  }
  .card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--accent, var(--gray));
  }
  .card:hover, .card:focus-visible{
    transform: translateY(-3px);
    border-color: var(--accent, var(--gray));
    box-shadow: 0 12px 24px var(--shadow);
  }
  .card.archived{ opacity:.55; }

  .icon-frame{
    width:38px; height:38px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    background: color-mix(in srgb, var(--accent, var(--gray)) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--accent, var(--gray)) 40%, transparent);
    color: var(--accent, var(--gray));
    margin-bottom:14px;
  }

  .card h3{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600; font-size:16.5px; line-height:1.3;
    margin:0 0 6px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .beta-tag{
    font-size:9.5px; letter-spacing:.06em; text-transform:uppercase;
    color:#C98A1E; border:1px solid #C98A1E; border-radius:3px; padding:1px 5px;
    font-family:'IBM Plex Mono', monospace; font-weight:600;
  }

  .card p{
    font-size:12.5px; line-height:1.55; color:var(--ink-soft); margin:0 0 12px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .chips{ display:flex; flex-wrap:wrap; gap:5px; margin-top:auto; }
  .chip{
    font-size:9.5px; letter-spacing:.03em;
    color: var(--c, var(--ink-soft));
    background: color-mix(in srgb, var(--c, var(--gray)) 14%, transparent);
    border:1px solid color-mix(in srgb, var(--c, var(--gray)) 35%, transparent);
    padding:2px 7px; border-radius:10px;
  }

  .card-bottom{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:12px; padding-top:12px; border-top:1px solid var(--card-border);
    font-size:11px; color:var(--ink-faint);
  }
  .open{
    color: var(--accent, var(--gray)); font-weight:600; font-size:11.5px;
    display:inline-flex; align-items:center; gap:4px;
  }

  .empty{ display:none; text-align:center; padding:60px 20px; color:var(--ink-faint); font-size:14px; }
  .empty.show{ display:block; }

  .sample-banner{
    display:none;
    background: color-mix(in srgb, #F0B429 16%, var(--card));
    border:1px solid #F0B429; color:#B8862B;
    font-size:12px; padding:10px 14px; border-radius:8px; margin-bottom:18px;
  }
  .sample-banner.show{ display:block; }

  /* ---------- footer: selalu terlihat ---------- */
  footer{
    flex:none;
    border-top:1px solid var(--card-border);
    padding-top:16px; padding-bottom:20px;
    font-size:12px; color:var(--ink-faint);
    transition: border-color .2s ease;
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } .icon-btn.spinning svg{ animation:none; } }
</style>
</head>
<body>

<div class="page">
  <div class="wrap controls">
    <p class="tagline">Merangkai Hal-hal yang berserak.</p>
    <p class="sample-banner" id="sampleBanner">Menampilkan data contoh — sambungkan URL Google Sheet Anda di CONFIG.SHEET_API_URL pada kode.</p>
    <div class="search-row">
      <div class="search-slot">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Cari judul, deskripsi, atau kategori…" autocomplete="off">
      </div>
      <button class="icon-btn theme-toggle" id="themeToggle" title="Ganti mode gelap/terang">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="4.2" y1="4.2" x2="6" y2="6"/><line x1="18" y1="18" x2="19.8" y2="19.8"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="4.2" y1="19.8" x2="6" y2="18"/><line x1="18" y1="6" x2="19.8" y2="4.2"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5A9 9 0 1 1 11.5 3a7 7 0 0 0 9.5 9.5z"/></svg>
      </button>
      <button class="icon-btn" id="reloadBtn" title="Muat ulang data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
    <div class="tabs" id="tabs"></div>
    <p class="meta-bar" id="metaBar"></p>
  </div>

  <main class="wrap">
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty">Tidak ada entri yang cocok. Coba kata kunci lain.</p>
  </main>

  <footer class="wrap">
    <span>© <span id="year"></span> — data diatur lewat Google Sheet.</span>
  </footer>
</div>

<script>
/* =========================================================================
   KONFIGURASI
   ========================================================================= */
const CONFIG = {
  SHEET_API_URL: "https://script.google.com/macros/s/AKfycbzqM3jx8bE3iYF4I0u3N9o_fAiefUXKSInYUg41jtC_PK2rQZwRuJjKGEbwEr6uih8efA/exec" // contoh: "https://script.google.com/macros/s/XXXXXXXX/exec"
};

/* Data contoh — dipakai kalau SHEET_API_URL kosong atau gagal diakses.
   Kolom "category" boleh berisi lebih dari satu kategori, dipisah "/". */
const SAMPLE_DATA = [
  { title: "Invoice Auto-Sender", desc: "Kirim invoice otomatis terjadwal ke klien tanpa sentuh manual.", url: "#", category: "Automation/Workflow Efficiency", status: "live" },
  { title: "Ops Dashboard", desc: "Ringkasan status operasional harian dalam satu layar.", url: "#", category: "Dashboard Management/Operational", status: "live" },
  { title: "Fleet Usage Report", desc: "Analisis pemakaian armada berdasarkan data mingguan.", url: "#", category: "Data Analytics/Resource Control", status: "beta" },
  { title: "Task Router", desc: "Distribusi tugas otomatis ke tim sesuai beban kerja.", url: "#", category: "Automation/Operational", status: "live" },
  { title: "Inventory Watch", desc: "Pantau stok dan ambang batas gudang secara real-time.", url: "#", category: "Resource Control", status: "live" },
];

/* Warna & ikon per kategori — taksonomi tetap, satu-satunya sumber warna di halaman ini */
const CATEGORY_META = {
  "Automation":            { color: "#3B76E0", icon: "bolt" },
  "Workflow Efficiency":   { color: "#1E9AA8", icon: "flow" },
  "Data Analytics":        { color: "#23A566", icon: "bars" },
  "Dashboard Management":  { color: "#7C4FE0", icon: "grid" },
  "Operational":           { color: "#B8862B", icon: "sliders" },
  "Resource Control":      { color: "#D9463D", icon: "gauge" },
};
const DEFAULT_META = { color: "#8A8F9A", icon: "dot" };

const ICONS = {
  bolt: `<polygon points="13,2 4,14 11,14 10,22 20,9 13,9"/>`,
  flow: `<circle cx="5" cy="19" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><line x1="6.8" y1="17.2" x2="10.2" y2="13.8"/><line x1="13.8" y1="10.2" x2="17.2" y2="6.8"/>`,
  bars: `<line x1="5" y1="19" x2="5" y2="11" stroke-width="2.4"/><line x1="12" y1="19" x2="12" y2="5" stroke-width="2.4"/><line x1="19" y1="19" x2="19" y2="14" stroke-width="2.4"/>`,
  grid: `<rect x="4" y="4" width="7" height="7" rx="1.2"/><rect x="13" y="4" width="7" height="7" rx="1.2"/><rect x="4" y="13" width="7" height="7" rx="1.2"/><rect x="13" y="13" width="7" height="7" rx="1.2"/>`,
  sliders: `<line x1="4" y1="7" x2="20" y2="7"/><circle cx="14" cy="7" r="2" fill="var(--card)"/><line x1="4" y1="14" x2="20" y2="14"/><circle cx="9" cy="14" r="2" fill="var(--card)"/><line x1="4" y1="19" x2="20" y2="19"/><circle cx="17" cy="19" r="2" fill="var(--card)"/>`,
  gauge: `<circle cx="12" cy="12" r="8"/><line x1="12" y1="12" x2="15.5" y2="8.5"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>`,
  dot: `<circle cx="12" cy="12" r="7"/>`,
};

/* ================= tema (gelap / terang) ================= */
let userTheme = null; // null = ikuti preferensi sistem
function systemTheme(){ return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'; }
function activeTheme(){ return userTheme || systemTheme(); }
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); }
applyTheme(activeTheme());

document.getElementById('themeToggle').addEventListener('click', () => {
  userTheme = activeTheme() === 'dark' ? 'light' : 'dark';
  applyTheme(userTheme);
});
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (!userTheme) applyTheme(systemTheme());
  });
}

/* ================= state & render ================= */
let DATA = [];
let activeCategory = "Semua";
const ALL_CATEGORIES = ["Semua", ...Object.keys(CATEGORY_META)];

const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const searchEl = document.getElementById('search');
const emptyEl = document.getElementById('empty');
const metaBar = document.getElementById('metaBar');
const sampleBanner = document.getElementById('sampleBanner');
const reloadBtn = document.getElementById('reloadBtn');
document.getElementById('year').textContent = new Date().getFullYear();

function meta(cat){ return CATEGORY_META[cat] || DEFAULT_META; }
function statusLabel(s){ return { live:"Aktif", beta:"Beta", archived:"Arsip" }[s] || s || "Aktif"; }
function parseCategories(field){ return String(field || "").split("/").map(s => s.trim()).filter(Boolean); }

function buildTabs(){
  tabsEl.innerHTML = "";
  ALL_CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    const m = cat === "Semua" ? null : meta(cat);
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    if (m) btn.style.setProperty('--tab-color', m.color);
    btn.innerHTML = `<span class="swatch"></span>${cat}`;
    btn.addEventListener('click', () => { activeCategory = cat; buildTabs(); render(); });
    tabsEl.appendChild(btn);
  });
}

function render(){
  const q = searchEl.value.trim().toLowerCase();
  const filtered = DATA.filter(d => {
    const matchesCat = activeCategory === "Semua" || d.categories.includes(activeCategory);
    const matchesQ = !q || ((d.title||"") + (d.desc||"") + d.categories.join(" ")).toLowerCase().includes(q);
    return matchesCat && matchesQ;
  });

  grid.innerHTML = "";
  filtered.forEach(d => {
    const primary = meta(d.categories[0]);
    const a = document.createElement('a');
    a.className = 'card' + (d.status === 'archived' ? ' archived' : '');
    a.href = d.url || '#'; a.target = '_blank'; a.rel = 'noopener';
    a.style.setProperty('--accent', d.status === 'archived' ? '#8A8F9A' : primary.color);
    const chips = d.categories.map(c => `<span class="chip" style="--c:${meta(c).color}">${c}</span>`).join('');
    a.innerHTML = `
      <div class="icon-frame">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[primary.icon]}</svg>
      </div>
      <h3>${d.title || "(tanpa judul)"}${d.status === 'beta' ? '<span class="beta-tag">Beta</span>' : ''}</h3>
      <p>${d.desc || ""}</p>
      <div class="chips">${chips}</div>
      <div class="card-bottom">
        <span>${statusLabel(d.status)}</span>
        <span class="open">Buka →</span>
      </div>
    `;
    grid.appendChild(a);
  });

  emptyEl.classList.toggle('show', filtered.length === 0);
}

/* ================= pengambilan data dari Google Sheet ================= */
function withParsedCategories(items){
  return items.map(d => ({ ...d, categories: parseCategories(d.category) }));
}

async function loadData(){
  reloadBtn.classList.add('spinning');
  metaBar.classList.remove('show');

  if (!CONFIG.SHEET_API_URL) {
    DATA = withParsedCategories(SAMPLE_DATA);
    sampleBanner.classList.add('show');
    buildTabs();
    render();
    reloadBtn.classList.remove('spinning');
    return;
  }

  try {
    const res = await fetch(CONFIG.SHEET_API_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Respons tidak OK");
    const json = await res.json();
    if (!Array.isArray(json)) throw new Error("Format data tidak sesuai");
    DATA = withParsedCategories(json);
    sampleBanner.classList.remove('show');
  } catch (err) {
    DATA = withParsedCategories(SAMPLE_DATA);
    sampleBanner.classList.add('show');
    metaBar.textContent = "Gagal memuat dari Google Sheet — menampilkan data contoh. (" + err.message + ")";
    metaBar.classList.add('show');
  }
  buildTabs();
  render();
  reloadBtn.classList.remove('spinning');
}

searchEl.addEventListener('input', render);
reloadBtn.addEventListener('click', loadData);
loadData();
</script>

</body>
</html>
